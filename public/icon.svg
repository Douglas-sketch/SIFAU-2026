<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradiente principal azul -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2557"/>
      <stop offset="40%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <!-- Gradiente do escudo -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
    <!-- Gradiente dourado para detalhes -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <!-- Gradiente verde para check -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <!-- Sombra interna -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Fundo arredondado com gradiente -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>
  
  <!-- Padrão de grid sutil (cidade) -->
  <g opacity="0.06">
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1"/>
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- Círculo decorativo exterior -->
  <circle cx="256" cy="230" r="168" fill="none" stroke="white" stroke-width="2" opacity="0.1"/>
  
  <!-- Escudo principal -->
  <g filter="url(#shadow)">
    <path d="M256 62 L400 132 C400 140 398 290 256 408 C114 290 112 140 112 132 Z" 
          fill="url(#shieldGrad)" opacity="0.97"/>
  </g>
  
  <!-- Borda do escudo -->
  <path d="M256 62 L400 132 C400 140 398 290 256 408 C114 290 112 140 112 132 Z" 
        fill="none" stroke="url(#goldGrad)" stroke-width="5" opacity="0.8"/>
  
  <!-- Borda interna do escudo -->
  <path d="M256 82 L384 144 C384 152 382 282 256 388 C130 282 128 152 128 144 Z" 
        fill="none" stroke="#1e3a8a" stroke-width="1.5" opacity="0.15"/>
  
  <!-- Skyline da cidade (dentro do escudo) -->
  <g opacity="0.12">
    <rect x="152" y="280" width="24" height="60" rx="2" fill="#1e3a8a"/>
    <rect x="182" y="260" width="20" height="80" rx="2" fill="#1e3a8a"/>
    <rect x="208" y="290" width="18" height="50" rx="2" fill="#1e3a8a"/>
    <rect x="288" y="275" width="22" height="65" rx="2" fill="#1e3a8a"/>
    <rect x="316" y="255" width="18" height="85" rx="2" fill="#1e3a8a"/>
    <rect x="340" y="285" width="20" height="55" rx="2" fill="#1e3a8a"/>
  </g>
  
  <!-- Lupa de fiscalização -->
  <g transform="translate(256, 210)">
    <!-- Círculo da lupa -->
    <circle cx="0" cy="0" r="56" fill="none" stroke="#1e3a8a" stroke-width="11" opacity="0.9"/>
    <circle cx="0" cy="0" r="56" fill="none" stroke="#3b82f6" stroke-width="4" opacity="0.3"/>
    
    <!-- Vidro da lupa com reflexo -->
    <circle cx="0" cy="0" r="44" fill="#1e3a8a" opacity="0.06"/>
    <ellipse cx="-14" cy="-16" rx="16" ry="10" fill="white" opacity="0.25" transform="rotate(-30, -14, -16)"/>
    
    <!-- Cabo da lupa -->
    <line x1="40" y1="40" x2="78" y2="78" stroke="#1e3a8a" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
    <line x1="40" y1="40" x2="78" y2="78" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Checkmark dentro da lupa -->
    <polyline points="-20,2 -6,18 24,-16" fill="none" stroke="url(#greenGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Estrelas decorativas -->
  <g opacity="0.7">
    <polygon points="256,90 260,100 270,100 262,106 265,116 256,110 247,116 250,106 242,100 252,100" fill="url(#goldGrad)"/>
  </g>
  
  <!-- Texto SIFAU -->
  <text x="256" y="440" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="62" fill="white" letter-spacing="10" filter="url(#shadow)">SIFAU</text>
  
  <!-- Linha decorativa abaixo do texto -->
  <rect x="168" y="454" width="176" height="3" rx="1.5" fill="url(#goldGrad)" opacity="0.7"/>
  
  <!-- Texto menor -->
  <text x="256" y="478" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="400" font-size="14" fill="white" opacity="0.6" letter-spacing="4">FISCALIZAÇÃO URBANA</text>
</svg>