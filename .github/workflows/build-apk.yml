name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Remove singleFile plugin
        run: |
          node -e "
          const fs = require('fs');
          if (fs.existsSync('vite.config.ts')) {
            let c = fs.readFileSync('vite.config.ts','utf8');
            c = c.replace(/import.*vite-plugin-singlefile.*/g, '');
            c = c.replace(/viteSingleFile\(\)\s*,?/g, '');
            fs.writeFileSync('vite.config.ts', c);
          }
          "

      - name: Build web
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Android
        run: npx cap sync android

      - name: Fix Android Config, Permissions and Kotlin Duplicates
        run: |
          node -e "
          const fs = require('fs');
          
          // 1. Injetar Permissões no AndroidManifest.xml
          const manifestPath = 'android/app/src/main/AndroidManifest.xml';
          if (fs.existsSync(manifestPath)) {
            let manifest = fs.readFileSync(manifestPath, 'utf8');
            const permissions = [
              '<uses-permission android:name=\"android.permission.CAMERA\" />',
              '<uses-permission android:name=\"android.permission.ACCESS_FINE_LOCATION\" />',
              '<uses-permission android:name=\"android.permission.ACCESS_COARSE_LOCATION\" />'
            ];
            permissions.forEach(p => {
              if (!manifest.includes(p)) {
                manifest = manifest.replace('<application', p + '\n    <application');
              }
            });
            if (!manifest.includes('android:requestLegacyExternalStorage')) {
              manifest = manifest.replace('<application', '<application android:requestLegacyExternalStorage=\"true\"');
            }
            fs.writeFileSync(manifestPath, manifest);
          }

          // 2. CORREÇÃO CRÍTICA: Resolver Duplicate Class do Kotlin no build.gradle raiz
          const rootGradlePath = 'android/build.gradle';
          if (fs.existsSync(rootGradlePath)) {
            let rootGradle = fs.readFileSync(rootGradlePath, 'utf8');
            
            // Atualiza AGP para 8.9.1
            rootGradle = rootGradle.replace(/com\.android\.tools\.build:gradle:[^'\\\"]+/g, 'com.android.tools.build:gradle:8.9.1');
            
            // Adiciona a resolução de conflitos para TODOS os subprojetos
            const conflictResolution = '\nallprojects {\n    configurations.all {\n        resolutionStrategy.eachDependency { details ->\n            if (details.requested.group == \"org.jetbrains.kotlin\" && (details.requested.name == \"kotlin-stdlib-jdk7\" || details.requested.name == \"kotlin-stdlib-jdk8\")) {\n                details.useTarget \"org.jetbrains.kotlin:kotlin-stdlib:\" + details.requested.version\n            }\n        }\n    }\n}\n';
            
            if (!rootGradle.includes('resolutionStrategy')) {
              rootGradle += conflictResolution;
            }
            fs.writeFileSync(rootGradlePath, rootGradle);
          }

          // 3. Fix variables.gradle (SDK 36)
          const varsPath = 'android/variables.gradle';
          if (fs.existsSync(varsPath)) {
            let vars = fs.readFileSync(varsPath, 'utf8');
            vars = vars.replace(/compileSdkVersion\s*=\s*\d+/, 'compileSdkVersion = 36');
            vars = vars.replace(/targetSdkVersion\s*=\s*\d+/, 'targetSdkVersion = 36');
            fs.writeFileSync(varsPath, vars);
          }

          // 4. Fix Gradle Wrapper
          const wrapperPath = 'android/gradle/wrapper/gradle-wrapper.properties';
          if (fs.existsSync(wrapperPath)) {
            let wrapper = fs.readFileSync(wrapperPath, 'utf8');
            wrapper = wrapper.replace(/gradle-[0-9.]+-all\.zip/, 'gradle-8.12-all.zip');
            fs.writeFileSync(wrapperPath, wrapper);
          }
          "

      - name: Install Android SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" || true

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          cd ..

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: SIFAU-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
