name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Força o ambiente a usar Node 24 para todas as ações javascript
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24' # Atualizado de 20 para 24

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Remove singleFile plugin
        run: |
          node -e "
          let c = require('fs').readFileSync('vite.config.ts','utf8');
          c = c.replace(/import.*vite-plugin-singlefile.*/g, '');
          c = c.replace(/viteSingleFile\(\)\s*,?/g, '');
          require('fs').writeFileSync('vite.config.ts', c);
          "

      - name: Build web
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Android
        run: npx cap sync android

      - name: Patch AndroidManifest permissions and legacy storage
        run: |
          node <<'NODE'
          const fs = require('fs');
          const manifestPath = 'android/app/src/main/AndroidManifest.xml';
          if (!fs.existsSync(manifestPath)) {
            throw new Error('AndroidManifest.xml não encontrado em ' + manifestPath);
          }

          let manifest = fs.readFileSync(manifestPath, 'utf8');

          const permissions = [
            'android.permission.CAMERA',
            'android.permission.ACCESS_COARSE_LOCATION',
            'android.permission.ACCESS_FINE_LOCATION',
          ];

          for (const perm of permissions) {
            if (!manifest.includes(`android:name="${perm}"`)) {
              manifest = manifest.replace(
                /<manifest[^>]*>/,
                (m) => m + '\n    <uses-permission android:name="' + perm + '" />'
                (m) => `${m}
    <uses-permission android:name="${perm}" />`
              );
            }
          }

          // Ensure requestLegacyExternalStorage is enabled in application tag
          manifest = manifest.replace(/<application([^>]*)>/, (full, attrs) => {
            if (attrs.includes('android:requestLegacyExternalStorage')) {
              return `<application${attrs.replace(/android:requestLegacyExternalStorage="[^"]*"/, 'android:requestLegacyExternalStorage="true"')}>`;
            }
            return `<application${attrs} android:requestLegacyExternalStorage="true">`;
          });

          fs.writeFileSync(manifestPath, manifest);

          const verification = fs.readFileSync(manifestPath, 'utf8');
          if (!verification.includes('android:requestLegacyExternalStorage="true"')) {
            throw new Error('android:requestLegacyExternalStorage="true" não encontrado na tag <application>.');
          }

          for (const perm of permissions) {
            if (!verification.includes(`android:name="${perm}"`)) {
              throw new Error('Permissão ausente no AndroidManifest: ' + perm);
            }
          }

          console.log('AndroidManifest atualizado e validado com sucesso.');
          NODE

      - name: Fix Android build config
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          // Fix variables.gradle
          const varsPath = 'android/variables.gradle';
          if (fs.existsSync(varsPath)) {
            let vars = fs.readFileSync(varsPath, 'utf8');
            vars = vars.replace(/compileSdkVersion\s*=\s*\d+/, 'compileSdkVersion = 36');
            vars = vars.replace(/targetSdkVersion\s*=\s*\d+/, 'targetSdkVersion = 36');
            fs.writeFileSync(varsPath, vars);
            console.log('variables.gradle updated to SDK 36');
          }

          // Fix root build.gradle - update AGP
          const rootGradle = 'android/build.gradle';
          if (fs.existsSync(rootGradle)) {
            let root = fs.readFileSync(rootGradle, 'utf8');
            root = root.replace(/com\.android\.tools\.build:gradle:[^'\\\"]+/g, 'com.android.tools.build:gradle:8.9.1');
            fs.writeFileSync(rootGradle, root);
            console.log('Root build.gradle AGP updated to 8.9.1');
          }

          // Fix app/build.gradle
          const appGradle = 'android/app/build.gradle';
          if (fs.existsSync(appGradle)) {
            let app = fs.readFileSync(appGradle, 'utf8');

            // Force compileSdk and targetSdk to 36
            app = app.replace(/compileSdk\w*\s+\d+/g, 'compileSdkVersion 36');
            app = app.replace(/targetSdk\w*\s+\d+/g, 'targetSdkVersion 36');

            // Add Kotlin exclusions if not present
            if (!app.includes('exclude group')) {
              app = app.replace(
                /dependencies\s*\{/,
                'dependencies {\n        configurations.all {\n            exclude group: \'org.jetbrains.kotlin\', module: \'kotlin-stdlib-jdk7\'\n            exclude group: \'org.jetbrains.kotlin\', module: \'kotlin-stdlib-jdk8\'\n        }\n        '
              );
            }

            // Fix gradle-wrapper.properties to use Gradle 8.12
            const wrapperPath = 'android/gradle/wrapper/gradle-wrapper.properties';
            if (fs.existsSync(wrapperPath)) {
              let wrapper = fs.readFileSync(wrapperPath, 'utf8');
              wrapper = wrapper.replace(/gradle-[0-9.]+-all\.zip/, 'gradle-8.12-all.zip');
              fs.writeFileSync(wrapperPath, wrapper);
              console.log('Gradle wrapper updated to 8.12');
            }

            fs.writeFileSync(appGradle, app);
            console.log('app/build.gradle updated');
          }
          "

      - name: Install Android SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" || true

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          cd ..

      - name: Upload APK
        uses: actions/upload-artifact@v6 # Atualizado de v5 para v6
        with:
          name: SIFAU-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
