name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Remove singleFile plugin
        run: |
          node -e "
          const fs = require('fs');
          if (fs.existsSync('vite.config.ts')) {
            let c = fs.readFileSync('vite.config.ts','utf8');
            c = c.replace(/import.*vite-plugin-singlefile.*/g, '');
            c = c.replace(/viteSingleFile\(\)\s*,?/g, '');
            fs.writeFileSync('vite.config.ts', c);
          }
          "

      - name: Build web
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Android
        run: npx cap sync android

      - name: Patch AndroidManifest permissions and legacy storage
        run: |
          node -e "
          const fs = require('fs');
          const path = 'android/app/src/main/AndroidManifest.xml';
          if (!fs.existsSync(path)) {
            console.log('Manifest não encontrado, pulando patch.');
            process.exit(0);
          }

          let manifest = fs.readFileSync(path, 'utf8');
          const permissions = [
            'android.permission.CAMERA',
            'android.permission.ACCESS_COARSE_LOCATION',
            'android.permission.ACCESS_FINE_LOCATION'
          ];

          permissions.forEach(perm => {
            if (!manifest.includes(perm)) {
              manifest = manifest.replace('<application', '    <uses-permission android:name=\"' + perm + '\" />\n    <application');
            }
          });

          if (!manifest.includes('android:requestLegacyExternalStorage')) {
            manifest = manifest.replace('<application', '<application android:requestLegacyExternalStorage=\"true\"');
          }

          fs.writeFileSync(path, manifest);
          console.log('AndroidManifest atualizado com sucesso.');
          "

      - name: Fix Android build config
        run: |
          node -e "
          const fs = require('fs');
          
          const varsPath = 'android/variables.gradle';
          if (fs.existsSync(varsPath)) {
            let vars = fs.readFileSync(varsPath, 'utf8');
            vars = vars.replace(/compileSdkVersion\s*=\s*\d+/, 'compileSdkVersion = 36');
            vars = vars.replace(/targetSdkVersion\s*=\s*\d+/, 'targetSdkVersion = 36');
            fs.writeFileSync(varsPath, vars);
          }

          const rootGradle = 'android/build.gradle';
          if (fs.existsSync(rootGradle)) {
            let root = fs.readFileSync(rootGradle, 'utf8');
            root = root.replace(/com\.android\.tools\.build:gradle:[^'\\\"]+/g, 'com.android.tools.build:gradle:8.9.1');
            fs.writeFileSync(rootGradle, root);
          }

          const wrapperPath = 'android/gradle/wrapper/gradle-wrapper.properties';
          if (fs.existsSync(wrapperPath)) {
            let wrapper = fs.readFileSync(wrapperPath, 'utf8');
            wrapper = wrapper.replace(/gradle-[0-9.]+-all\.zip/, 'gradle-8.12-all.zip');
            fs.writeFileSync(wrapperPath, wrapper);
          }
          "

      - name: Install Android SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" || true

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          cd ..

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: SIFAU-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
